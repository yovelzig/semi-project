<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI RAG Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <div class="card">
            <h1>AI RAG Assistant</h1>
            <p class="subtitle">
                Ask questions based on the uploaded knowledge base documents.
            </p>
<div class="upload-section">
    <h2>Upload File</h2>

    <input
        type="file"
        id="fileInput"
        accept=".txt,.md,.csv,.json,.pdf,.docx,.xlsx"
    >

    <button id="uploadButton">Upload</button>

    <div id="uploadStatus" class="upload-status"></div>
</div>

<div class="files-section">
    <h2>Loaded Files</h2>

    <button id="refreshFilesButton">Refresh Files</button>

    <ul id="filesList" class="files-list"></ul>
</div>

            <div class="form-group">
                <label for="questionInput">Your question</label>
                <textarea
                    id="questionInput"
                    placeholder="Example: What does DNS do?"
                    rows="4"
                ></textarea>
            </div>

            <button id="askButton">Ask</button>

            <div id="loading" class="loading hidden">
                Thinking...
            </div>

            <div id="errorBox" class="error hidden"></div>

            <div id="answerSection" class="section hidden">
                <h2>Answer</h2>
                <div id="answerBox" class="answer"></div>
            </div>

            <div id="contextSection" class="section hidden">
                <h2>Retrieved Context</h2>
                <div id="contextBox"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
